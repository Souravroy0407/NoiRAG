# ============================================================
# NoiRAG — Central Configuration File
# ============================================================

# ── Project Info ────────────────────────────────────────────
project:
  name: "NoiRAG"
  version: "2.0.0"

# ── Paths ───────────────────────────────────────────────────
paths:
  raw_pdfs: "data/raw_pdfs"
  ground_truth: "data/ground_truth"
  noisy: "data/noisy"
  cleaned: "data/cleaned"
  results: "results"
  tables: "results/tables"

# ── Dataset ─────────────────────────────────────────────────
dataset:
  domains:
    - academic
    - finance
    - textbook
  pdfs_per_domain: 15

# ── Noise Injection ─────────────────────────────────────────
noise:
  levels:
    - 0.25       # 25%
    - 0.75       # 75%
  types:
    - semantic
    - formatting

# ── Preprocessing ────────────────────────────────────────────
preprocessing:
  strategies:
    - rule_based
    - statistical
    - hybrid           # Hybrid = Rule + Statistical + LLM routing
  hybrid_thresholds:
    formatting: 0.05   # OOV score > 0.05 → apply rule-based formatting fixes
    statistical: 0.10  # OOV score > 0.10 → apply statistical spell correction
    llm: 0.60          # Overall score > 0.60 → route to local LLM for repair

# ── RAG Pipeline ─────────────────────────────────────────────
rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  embedding_model: "BAAI/bge-small-en-v1.5"

# ── LLM Cleaning (Local Ollama) ──────────────────────────────
llm_cleaner:
  provider: "ollama"
  model: "qwen2.5:0.5b"
  base_url: "http://localhost:11434/api/chat"
  temperature: 0.0                            # deterministic cleaning

# ── LLM (Answer Generation — OpenRouter) ─────────────────────
llm_generator:
  provider: "openrouter"
  model: "meta-llama/llama-3-8b-instruct"
  base_url: "https://openrouter.ai/api/v1"
  max_tokens: 512
  temperature: 0.1

# ── Evaluation ───────────────────────────────────────────────
evaluation:
  k_values:
    - 1
    - 3
    - 5
  metrics:
    retrieval:
      - precision_at_k
      - recall_at_k
      - f1_at_k
      - mrr
      - ndcg
    generation:
      - bleu
      - rouge1
      - rouge2
      - rougeL
    novel:
      - nrr                                   # Noise Recovery Rate