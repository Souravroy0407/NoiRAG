# ============================================================
# NoiseClear-RAG — Central Configuration File
# ============================================================

# ── Project Info ────────────────────────────────────────────
project:
  name: "NoiseClear-RAG"
  version: "1.0.0"

# ── Paths ───────────────────────────────────────────────────
paths:
  raw_pdfs: "data/raw_pdfs"
  ground_truth: "data/ground_truth"
  noisy_versions: "data/noisy_versions"
  results: "results"
  plots: "results/plots"
  tables: "results/tables"

# ── Dataset ─────────────────────────────────────────────────
dataset:
  domains:
    - academic
    - finance
    - textbook
  pdfs_per_domain: 15        # start with 15, expand to 30+ later

# ── Noise Injection ─────────────────────────────────────────
noise:
  levels:
    - 0.10       # 10%
    - 0.25       # 25%
    - 0.50       # 50%
    - 0.75       # 75%
  types:
    - semantic
    - formatting

# ── Preprocessing ────────────────────────────────────────────
preprocessing:
  strategies:
    - rule_based
    - statistical
    - llm_based
    - hybrid
  hybrid_thresholds:
    keep_as_is: 0.85         # score > 0.85 → no cleaning needed
    statistical: 0.60        # 0.60–0.85 → statistical cleaning
    llm: 0.0                 # < 0.60 → LLM cleaning

# ── RAG Pipeline ─────────────────────────────────────────────
rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5
  embedding_model: "BAAI/bge-small-en-v1.5"

# ── LLM (Answer Generation) ──────────────────────────────────
llm:
  provider: "openrouter"
  model: "meta-llama/llama-3-8b-instruct"     # free model on OpenRouter
  base_url: "https://openrouter.ai/api/v1"
  max_tokens: 512
  temperature: 0.1                             # low = more factual answers

# ── LLM Cleaning (Gemini) ────────────────────────────────────
gemini:
  model: "gemini-1.5-flash"                   # free tier
  max_tokens: 1024
  temperature: 0.0                            # deterministic cleaning

# ── Evaluation ───────────────────────────────────────────────
evaluation:
  k_values:
    - 1
    - 3
    - 5
  metrics:
    retrieval:
      - precision_at_k
      - recall_at_k
      - f1_at_k
      - mrr
      - ndcg
    generation:
      - bleu
      - rouge1
      - rouge2
      - rougeL
    novel:
      - nrr                                   # Noise Recovery Rate